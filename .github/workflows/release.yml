name: Release Build

on:
  # Triggered exclusively by a version tag pushed to main.
  # Using workflow_dispatch is intentionally disabled to avoid duplicate releases.
  push:
    tags:
      - 'v*.*.*'

permissions: write-all

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0

concurrency:
  group: '${{ github.workflow }} - ${{ github.head_ref || github.ref }}'
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ────────────────────────────────────────────────────────────────
  # Guard: ensure the tag comes from main and matches package.json
  # ────────────────────────────────────────────────────────────────
  check_tag_version:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is from main branch
        run: |
          TAG_REF="${GITHUB_REF##*/}"
          echo "Checking if tag $TAG_REF originates from main..."
          TAG_COMMIT=$(git rev-list -n 1 "$TAG_REF")
          if git rev-list origin/main | grep -q "$TAG_COMMIT"; then
            echo "✅ Tag $TAG_REF is on main"
          else
            echo "❌ Tag $TAG_REF is not on main — aborting"
            exit 1
          fi

      - name: Verify tag matches package.json version
        run: |
          TAG_REF="${GITHUB_REF_NAME:-${GITHUB_REF##*/}}"
          PKG_VERSION=$(jq -r .version package.json)
          EXPECTED_TAG="v$PKG_VERSION"
          echo "Tag: $TAG_REF  |  Expected: $EXPECTED_TAG"
          if [[ "$TAG_REF" != "$EXPECTED_TAG" ]]; then
            echo "❌ Version mismatch — git tag ($TAG_REF) does not match package.json ($EXPECTED_TAG)"
            exit 1
          fi
          echo "✅ Tag and package.json version are consistent"

  # ────────────────────────────────────────────────────────────────
  # Main platform builds
  # ────────────────────────────────────────────────────────────────
  release:
    name: Release — ${{ matrix.target }}
    needs: [check_tag_version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.91.0'
          targets: ${{ matrix.target }}

      - name: Add Rust target
        run: |
          rustup target add ${{ matrix.target }} --toolchain 1.91.0 || rustup target add ${{ matrix.target }}
          rustup target list --installed

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/dev' }}
          prefix-key: 'v1-rust'
          key: 'rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}'
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxslt1.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install x86 OpenSSL (macOS cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          arch -x86_64 brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install dependencies and prebuild
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: Tauri build
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Celestial ${{ github.ref_name }}'
          releaseDraft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          tauriScript: pnpm
          args: --target ${{ matrix.target }}

      - name: Attest build provenance (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/bundle/nsis/*setup*

  # ────────────────────────────────────────────────────────────────
  # ARM Linux builds
  # ────────────────────────────────────────────────────────────────
  release-for-linux-arm:
    name: Release — Linux ARM (${{ matrix.target }})
    needs: [check_tag_version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - os: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            arch: armhf
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust stable (pinned)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.91.0'
          targets: ${{ matrix.target }}

      - name: Add Rust target
        run: |
          rustup target add ${{ matrix.target }} --toolchain 1.91.0 || rustup target add ${{ matrix.target }}
          rustup target list --installed

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/dev' }}
          prefix-key: 'v1-rust'
          key: 'rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}'
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install dependencies and prebuild
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: Configure apt for cross-compilation
        run: |
          cat > /tmp/sources.list << EOF
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-security main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-updates main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-backports main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main multiverse universe restricted
          EOF
          sudo mv /etc/apt/sources.list /etc/apt/sources.list.default
          sudo mv /tmp/sources.list /etc/apt/sources.list
          sudo dpkg --add-architecture ${{ matrix.arch }}
          sudo apt update
          sudo apt install -y \
            libxslt1.1:${{ matrix.arch }} \
            libwebkit2gtk-4.1-dev:${{ matrix.arch }} \
            libayatana-appindicator3-dev:${{ matrix.arch }} \
            libssl-dev:${{ matrix.arch }} \
            patchelf:${{ matrix.arch }} \
            librsvg2-dev:${{ matrix.arch }}

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install ARMv7 cross-compiler
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Tauri build (Linux ARM)
        run: |
          export PKG_CONFIG_ALLOW_CROSS=1
          if [ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]; then
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig/:$PKG_CONFIG_PATH
            export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu/
          elif [ "${{ matrix.target }}" == "armv7-unknown-linux-gnueabihf" ]; then
            export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig/:$PKG_CONFIG_PATH
            export PKG_CONFIG_SYSROOT_DIR=/usr/arm-linux-gnueabihf/
          fi
          pnpm build --target ${{ matrix.target }}
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Get version
        run: echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_ENV

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Celestial ${{ github.ref_name }}'
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm

  # ────────────────────────────────────────────────────────────────
  # Windows — bundled WebView2 variants
  # ────────────────────────────────────────────────────────────────
  release-for-fixed-webview2:
    name: Release — Windows bundled WebView2 (${{ matrix.arch }})
    needs: [check_tag_version]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Add Rust target
        run: |
          rustup target add ${{ matrix.target }} --toolchain 1.91.0 || rustup target add ${{ matrix.target }}
          rustup target list --installed

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/dev' }}
          prefix-key: 'v1-rust'
          key: 'rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}'
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: 'pnpm'

      - name: Install dependencies and prebuild
        run: |
          pnpm i
          pnpm run prebuild ${{ matrix.target }}

      - name: Download and extract bundled WebView2 runtime
        run: |
          invoke-webrequest -uri https://github.com/westinyang/WebView2RuntimeArchive/releases/download/133.0.3065.92/Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab -outfile Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab
          Expand .\Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab -F:* ./src-tauri
          Remove-Item .\src-tauri\tauri.windows.conf.json
          Rename-Item .\src-tauri\webview2.${{ matrix.arch }}.json tauri.windows.conf.json

      - name: Add Rust target (pinned toolchain)
        run: |
          rustup target add ${{ matrix.target }} --toolchain 1.91.0 || rustup target add ${{ matrix.target }}
          rustup target list --installed

      - name: Tauri build
        id: build
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tauriScript: pnpm
          args: --target ${{ matrix.target }}

      - name: Rename artifacts to indicate bundled WebView2
        run: |
          $files = Get-ChildItem ".\target\${{ matrix.target }}\release\bundle\nsis\*-setup.exe"
          foreach ($file in $files) {
            Rename-Item $file.FullName ($file.Name -replace "-setup\.exe$", "_fixed_webview2-setup.exe")
          }
          $files = Get-ChildItem ".\target\${{ matrix.target }}\release\bundle\nsis\*.nsis.zip"
          foreach ($file in $files) {
            Rename-Item $file.FullName ($file.Name -replace "-setup\.nsis\.zip$", "_fixed_webview2-setup.nsis.zip")
          }
          $files = Get-ChildItem ".\target\${{ matrix.target }}\release\bundle\nsis\*-setup.exe.sig"
          foreach ($file in $files) {
            Rename-Item $file.FullName ($file.Name -replace "-setup\.exe\.sig$", "_fixed_webview2-setup.exe.sig")
          }

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/bundle/nsis/*setup*

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Celestial ${{ github.ref_name }}'
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: target/${{ matrix.target }}/release/bundle/nsis/*setup*

      - name: Build portable bundle (WebView2)
        run: pnpm portable-fixed-webview2 ${{ matrix.target }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # Post-release: update tag body with full download table
  # ────────────────────────────────────────────────────────────────
  update_tag:
    name: Update release notes
    runs-on: ubuntu-latest
    needs: [release, release-for-linux-arm, release-for-fixed-webview2]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch update logs
        id: fetch_update_logs
        run: bash ./scripts/extract_update_logs.sh
        shell: bash

      - name: Set environment variables
        run: |
          TAG_REF="${GITHUB_REF##*/}"
          VERSION="${TAG_REF#v}"
          echo "TAG_NAME=$TAG_REF" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=https://github.com/pius-pp/celestial-mihomo-client/releases/download/$TAG_REF" >> $GITHUB_ENV
          echo "BUILDTIME=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV
        shell: bash

      - name: Generate release body
        run: |
          if [ -z "$UPDATE_LOGS" ]; then
            UPDATE_LOGS="No changelog entry found for this release."
          fi

          cat > release.txt << EOF
          $UPDATE_LOGS

          ## Downloads

          ### Windows
          #### Standard installer (recommended)
          - [x64 (most common)](${{ env.DOWNLOAD_URL }}/Celestial_${{ env.VERSION }}_x64-setup.exe) | [ARM64](${{ env.DOWNLOAD_URL }}/Celestial_${{ env.VERSION }}_arm64-setup.exe)

          #### Bundled WebView2 (larger download — use only if WebView2 is unavailable on your system)
          - [x64](${{ env.DOWNLOAD_URL }}/Celestial_${{ env.VERSION }}_x64_fixed_webview2-setup.exe) | [ARM64](${{ env.DOWNLOAD_URL }}/Celestial_${{ env.VERSION }}_arm64_fixed_webview2-setup.exe)

          ### macOS
          - [Apple Silicon (M-series)](${{ env.DOWNLOAD_URL }}/Celestial_${{ env.VERSION }}_aarch64.dmg) | [Intel](${{ env.DOWNLOAD_URL }}/Celestial_${{ env.VERSION }}_x64.dmg)

          ### Linux
          #### DEB package (Debian / Ubuntu) — install with \`sudo apt install ./file.deb\`
          - [x64](${{ env.DOWNLOAD_URL }}/Celestial_${{ env.VERSION }}_amd64.deb) | [ARM64](${{ env.DOWNLOAD_URL }}/Celestial_${{ env.VERSION }}_arm64.deb) | [ARMv7](${{ env.DOWNLOAD_URL }}/Celestial_${{ env.VERSION }}_armhf.deb)

          #### RPM package (Fedora / RHEL) — install with \`sudo dnf install ./file.rpm\`
          - [x64](${{ env.DOWNLOAD_URL }}/Celestial-${{ env.VERSION }}-1.x86_64.rpm) | [ARM64](${{ env.DOWNLOAD_URL }}/Celestial-${{ env.VERSION }}-1.aarch64.rpm) | [ARMv7](${{ env.DOWNLOAD_URL }}/Celestial-${{ env.VERSION }}-1.armhfp.rpm)

          ---

          Built at ${{ env.BUILDTIME }}.
          EOF

      - name: Upload release body
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: 'Celestial ${{ env.TAG_NAME }}'
          body_path: release.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # Post-release: updater manifests (skip for -rc tags)
  # ────────────────────────────────────────────────────────────────
  release-update:
    if: ${{ !contains(github.ref_name, '-rc') }}
    name: Publish updater manifest
    runs-on: ubuntu-latest
    needs: [update_tag]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm i

      - name: Publish updater file
        run: pnpm updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-update-for-fixed-webview2:
    if: ${{ !contains(github.ref_name, '-rc') }}
    name: Publish updater manifest (bundled WebView2)
    runs-on: ubuntu-latest
    needs: [update_tag]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm i

      - name: Publish updater file
        run: pnpm updater-fixed-webview2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # Post-release: Winget submission (skip for -rc tags)
  # ────────────────────────────────────────────────────────────────
  submit-to-winget:
    if: ${{ !contains(github.ref_name, '-rc') }}
    name: Submit to Winget
    runs-on: ubuntu-latest
    needs: [update_tag, release-update]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        run: echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_ENV

      - name: Submit to Winget
        uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: PiusPP.Celestial
          version: ${{ env.VERSION }}
          release-tag: v${{ env.VERSION }}
          installers-regex: '_(arm64|x64|x86)-setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

  # ────────────────────────────────────────────────────────────────
  # Post-release: Telegram notification (skip for -rc tags)
  # ────────────────────────────────────────────────────────────────
  notify-telegram:
    if: ${{ !contains(github.ref_name, '-rc') }}
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs:
      - update_tag
      - release-update
      - release-update-for-fixed-webview2
      - submit-to-winget
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch update logs
        id: fetch_update_logs
        run: bash ./scripts/extract_update_logs.sh
        shell: bash

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'

      - uses: pnpm/action-setup@v6
        name: Install pnpm
        with:
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set environment variables
        run: |
          echo "VERSION=$(jq -r '.version' package.json)" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=https://github.com/pius-pp/celestial-mihomo-client/releases/download/v$(jq -r '.version' package.json)" >> $GITHUB_ENV

      - name: Send Telegram notification
        run: node scripts/telegram.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          BUILD_TYPE: release
          VERSION: ${{ env.VERSION }}
          DOWNLOAD_URL: ${{ env.DOWNLOAD_URL }}
          