name: Release Build (private -> public)

on:
  push:
    tags:
      - 'v*.*.*'
      - 'testv*.*.*'

permissions:
  contents: read
  actions: read
  attestations: write
  id-token: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0
  RUST_TOOLCHAIN: '1.91.0'
  NODE_VERSION: '24.15.0'
  RELEASE_SOURCE_BRANCH: dev
  PUBLIC_RELEASE_REPO: pius-pp/celestial-mihomo-client-public

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate tag and prepare metadata
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      pkg_version: ${{ steps.meta.outputs.pkg_version }}
      version: ${{ steps.meta.outputs.version }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_test: ${{ steps.meta.outputs.is_test }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      public_download_url: ${{ steps.meta.outputs.public_download_url }}
      asset_prefix: ${{ steps.meta.outputs.asset_prefix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is from release branch
        shell: bash
        run: |
          set -euo pipefail
          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git fetch origin "$RELEASE_SOURCE_BRANCH" --depth=1
          if git merge-base --is-ancestor "$TAG_COMMIT" "origin/$RELEASE_SOURCE_BRANCH"; then
            echo "Tag $GITHUB_REF_NAME is reachable from $RELEASE_SOURCE_BRANCH"
          else
            echo "Tag $GITHUB_REF_NAME is not on $RELEASE_SOURCE_BRANCH"
            exit 1
          fi

      - name: Validate tag format against package.json
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG_REF="${GITHUB_REF_NAME}"
          PKG_VERSION="$(jq -r .version package.json)"

          if [[ "$TAG_REF" =~ ^testv[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_TEST=true
            EXPECTED_TAG="testv${PKG_VERSION}"
            RELEASE_NAME="Celestial TEST ${TAG_REF}"
            IS_PRERELEASE=true
          elif [[ "$TAG_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_TEST=false
            EXPECTED_TAG="v${PKG_VERSION}"
            RELEASE_NAME="Celestial ${TAG_REF}"
            IS_PRERELEASE=false
          else
            echo "Unsupported tag format: $TAG_REF"
            exit 1
          fi

          if [[ "$TAG_REF" != "$EXPECTED_TAG" ]]; then
            echo "Version mismatch: git tag ($TAG_REF) does not match package.json ($EXPECTED_TAG)"
            exit 1
          fi

          echo "tag_name=$TAG_REF" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "is_test=$IS_TEST" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "public_download_url=https://github.com/${PUBLIC_RELEASE_REPO}/releases/download/${TAG_REF}" >> "$GITHUB_OUTPUT"
          echo "asset_prefix=Celestial_${PKG_VERSION}" >> "$GITHUB_OUTPUT"

  release:
    name: Build - ${{ matrix.target }}
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Add Rust target
        shell: bash
        run: |
          rustup target add ${{ matrix.target }} --toolchain ${{ env.RUST_TOOLCHAIN }} || rustup target add ${{ matrix.target }}
          rustup target list --installed

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          key: rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxslt1.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install x86 OpenSSL (macOS cross-compile)
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          arch -x86_64 brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> "$GITHUB_ENV"
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies and prebuild
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run prebuild ${{ matrix.target }}

      - name: Tauri build
        shell: bash
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Attest build provenance (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/bundle/nsis/*setup*

      - name: Attest build provenance (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Attest build provenance (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.target }}/release/bundle/**/*.exe
            target/${{ matrix.target }}/release/bundle/**/*.msi
            target/${{ matrix.target }}/release/bundle/**/*.zip
            target/${{ matrix.target }}/release/bundle/**/*.dmg
            target/${{ matrix.target }}/release/bundle/**/*.app.tar.gz
            target/${{ matrix.target }}/release/bundle/**/*.AppImage
            target/${{ matrix.target }}/release/bundle/**/*.deb
            target/${{ matrix.target }}/release/bundle/**/*.rpm
            target/${{ matrix.target }}/release/bundle/**/*.sig

  release-for-linux-arm:
    name: Build - Linux ARM (${{ matrix.target }})
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            arch: arm64
          - os: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            arch: armhf
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Add Rust target
        shell: bash
        run: |
          rustup target add ${{ matrix.target }} --toolchain ${{ env.RUST_TOOLCHAIN }} || rustup target add ${{ matrix.target }}
          rustup target list --installed

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          key: rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies and prebuild
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run prebuild ${{ matrix.target }}

      - name: Configure apt for cross-compilation
        shell: bash
        run: |
          cat > /tmp/sources.list << EOF
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-security main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-updates main multiverse universe restricted
          deb [arch=amd64,i386] http://archive.ubuntu.com/ubuntu jammy-backports main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main multiverse universe restricted
          deb [arch=armhf,arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main multiverse universe restricted
          EOF
          sudo mv /etc/apt/sources.list /etc/apt/sources.list.default
          sudo mv /tmp/sources.list /etc/apt/sources.list
          sudo dpkg --add-architecture ${{ matrix.arch }}
          sudo apt update
          sudo apt install -y \
            libxslt1.1:${{ matrix.arch }} \
            libwebkit2gtk-4.1-dev:${{ matrix.arch }} \
            libayatana-appindicator3-dev:${{ matrix.arch }} \
            libssl-dev:${{ matrix.arch }} \
            patchelf:${{ matrix.arch }} \
            librsvg2-dev:${{ matrix.arch }}

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install ARMv7 cross-compiler
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: sudo apt install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Tauri build (Linux ARM)
        shell: bash
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          export PKG_CONFIG_ALLOW_CROSS=1
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig/:$PKG_CONFIG_PATH
            export PKG_CONFIG_SYSROOT_DIR=/usr/aarch64-linux-gnu/
          elif [ "${{ matrix.target }}" = "armv7-unknown-linux-gnueabihf" ]; then
            export PKG_CONFIG_PATH=/usr/lib/arm-linux-gnueabihf/pkgconfig/:$PKG_CONFIG_PATH
            export PKG_CONFIG_SYSROOT_DIR=/usr/arm-linux-gnueabihf/
          fi
          pnpm build --target ${{ matrix.target }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            target/${{ matrix.target }}/release/bundle/**/*.sig

  release-for-fixed-webview2:
    name: Build - Windows bundled WebView2 (${{ matrix.arch }})
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: ${{ matrix.target }}

      - name: Add Rust target
        shell: bash
        run: |
          rustup target add ${{ matrix.target }} --toolchain ${{ env.RUST_TOOLCHAIN }} || rustup target add ${{ matrix.target }}
          rustup target list --installed

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          key: rust-shared-stable-${{ matrix.os }}-${{ matrix.target }}
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies and prebuild
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run prebuild ${{ matrix.target }}

      - name: Download and extract bundled WebView2 runtime
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/westinyang/WebView2RuntimeArchive/releases/download/133.0.3065.92/Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab" -OutFile "Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab"
          Expand .\Microsoft.WebView2.FixedVersionRuntime.133.0.3065.92.${{ matrix.arch }}.cab -F:* ./src-tauri
          Remove-Item .\src-tauri\tauri.windows.conf.json
          Rename-Item .\src-tauri\webview2.${{ matrix.arch }}.json tauri.windows.conf.json

      - name: Tauri build
        shell: bash
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Rename artifacts to indicate bundled WebView2
        shell: pwsh
        run: |
          $files = Get-ChildItem ".\target\${{ matrix.target }}\release\bundle\nsis\*-setup.exe"
          foreach ($file in $files) {
            Rename-Item $file.FullName ($file.Name -replace "-setup\.exe$", "_fixed_webview2-setup.exe")
          }

          $files = Get-ChildItem ".\target\${{ matrix.target }}\release\bundle\nsis\*.nsis.zip" -ErrorAction SilentlyContinue
          foreach ($file in $files) {
            Rename-Item $file.FullName ($file.Name -replace "-setup\.nsis\.zip$", "_fixed_webview2-setup.nsis.zip")
          }

          $files = Get-ChildItem ".\target\${{ matrix.target }}\release\bundle\nsis\*-setup.exe.sig"
          foreach ($file in $files) {
            Rename-Item $file.FullName ($file.Name -replace "-setup\.exe\.sig$", "_fixed_webview2-setup.exe.sig")
          }

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: target/${{ matrix.target }}/release/bundle/nsis/*setup*

      - name: Build portable bundle (WebView2)
        shell: bash
        env:
          PORTABLE_SKIP_RELEASE_UPLOAD: 1
        run: pnpm portable-fixed-webview2 ${{ matrix.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-fixed-webview2-${{ matrix.target }}
          if-no-files-found: error
          path: |
            target/${{ matrix.target }}/release/bundle/nsis/*setup*
            Celestial_*_fixed_webview2_portable.zip

  publish-public-release:
    name: Publish release to public repository
    runs-on: ubuntu-latest
    needs:
      - prepare
      - release
      - release-for-linux-arm
      - release-for-fixed-webview2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Flatten artifact tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./release-assets
          find ./dist -type f -exec cp {} ./release-assets/ \;
          echo "Collected files:"
          ls -lah ./release-assets

      - name: Fetch update logs
        shell: bash
        run: bash ./scripts/extract_update_logs.sh || true

      - name: Generate release body
        shell: bash
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          VERSION: ${{ needs.prepare.outputs.version }}
          DOWNLOAD_URL: ${{ needs.prepare.outputs.public_download_url }}
          IS_TEST: ${{ needs.prepare.outputs.is_test }}
        run: |
          set -euo pipefail
          BUILDTIME="$(date -u '+%Y-%m-%d %H:%M UTC')"

          if [ -z "${UPDATE_LOGS:-}" ]; then
            UPDATE_LOGS="No changelog entry found for this release."
          fi

          TEST_NOTE=""
          if [ "$IS_TEST" = "true" ]; then
            TEST_NOTE=$'\n> This is a TEST release published from the private repository pipeline.\n'
          fi

          cat > release.txt << EOF
          ${TEST_NOTE}
          ${UPDATE_LOGS}

          ## Downloads

          ### Windows
          #### Standard installer (recommended)
          - [x64 (most common)](${DOWNLOAD_URL}/Celestial_${VERSION}_x64-setup.exe) | [ARM64](${DOWNLOAD_URL}/Celestial_${VERSION}_arm64-setup.exe)

          #### Bundled WebView2
          - [x64](${DOWNLOAD_URL}/Celestial_${VERSION}_x64_fixed_webview2-setup.exe) | [ARM64](${DOWNLOAD_URL}/Celestial_${VERSION}_arm64_fixed_webview2-setup.exe)

          ### macOS
          - [Apple Silicon (M-series)](${DOWNLOAD_URL}/Celestial_${VERSION}_aarch64.dmg) | [Intel](${DOWNLOAD_URL}/Celestial_${VERSION}_x64.dmg)

          ### Linux
          #### DEB package (Debian / Ubuntu)
          - [x64](${DOWNLOAD_URL}/Celestial_${VERSION}_amd64.deb) | [ARM64](${DOWNLOAD_URL}/Celestial_${VERSION}_arm64.deb) | [ARMv7](${DOWNLOAD_URL}/Celestial_${VERSION}_armhf.deb)

          #### RPM package (Fedora / RHEL)
          - [x64](${DOWNLOAD_URL}/Celestial-${VERSION}-1.x86_64.rpm) | [ARM64](${DOWNLOAD_URL}/Celestial-${VERSION}-1.aarch64.rpm) | [ARMv7](${DOWNLOAD_URL}/Celestial-${VERSION}-1.armhfp.rpm)

          ---

          Built at ${BUILDTIME}.
          EOF

      - name: Create or update release in public repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          PUBLIC_REPO: ${{ env.PUBLIC_RELEASE_REPO }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$TAG_NAME" --repo "$PUBLIC_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --repo "$PUBLIC_REPO" \
              --title "$RELEASE_NAME" \
              --notes-file release.txt
          else
            gh release create "$TAG_NAME" \
              --repo "$PUBLIC_REPO" \
              --title "$RELEASE_NAME" \
              --notes-file release.txt \
              $PRERELEASE_FLAG
          fi

      - name: Upload assets to public release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          PUBLIC_REPO: ${{ env.PUBLIC_RELEASE_REPO }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(./release-assets/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          gh release upload "$TAG_NAME" "${files[@]}" \
            --repo "$PUBLIC_REPO" \
            --clobber

  release-update:
    if: ${{ !startsWith(github.ref_name, 'testv') && !contains(github.ref_name, '-rc') }}
    name: Publish updater manifest
    runs-on: ubuntu-latest
    needs: [publish-public-release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish updater file
        run: pnpm updater
        env:
          PUBLIC_RELEASE_REPO: ${{ env.PUBLIC_RELEASE_REPO }}
          PUBLIC_RELEASE_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}

  release-update-for-fixed-webview2:
    if: ${{ !startsWith(github.ref_name, 'testv') && !contains(github.ref_name, '-rc') }}
    name: Publish updater manifest (bundled WebView2)
    runs-on: ubuntu-latest
    needs: [publish-public-release]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish updater file
        run: pnpm updater-fixed-webview2
        env:
          PUBLIC_RELEASE_REPO: ${{ env.PUBLIC_RELEASE_REPO }}
          PUBLIC_RELEASE_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}

  submit-to-winget:
    if: ${{ !startsWith(github.ref_name, 'testv') && !contains(github.ref_name, '-rc') }}
    name: Submit to Winget
    runs-on: ubuntu-latest
    needs: [prepare, publish-public-release, release-update]
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        shell: bash
        run: echo "VERSION=${{ needs.prepare.outputs.version }}" >> "$GITHUB_ENV"

      - name: Submit to Winget
        uses: vedantmgoyal9/winget-releaser@main
        env:
          GITHUB_REPOSITORY: ${{ env.PUBLIC_RELEASE_REPO }}
        with:
          identifier: PiusPP.Celestial
          version: ${{ needs.prepare.outputs.version }}
          release-tag: ${{ needs.prepare.outputs.tag_name }}
          release-notes-url: https://github.com/${{ env.PUBLIC_RELEASE_REPO }}/releases/tag/${{ needs.prepare.outputs.tag_name }}
          installers-regex: '_(arm64|x64|x86)-setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

  notify-telegram:
    if: ${{ !startsWith(github.ref_name, 'testv') && !contains(github.ref_name, '-rc') }}
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish-public-release
      - release-update
      - release-update-for-fixed-webview2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch update logs
        shell: bash
        run: bash ./scripts/extract_update_logs.sh || true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Send Telegram notification
        run: node scripts/telegram.mjs
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_RELEASE_CHAT_ID: '@celestial_releases'
          BUILD_TYPE: release
          VERSION: ${{ needs.prepare.outputs.version }}
          DOWNLOAD_URL: ${{ needs.prepare.outputs.public_download_url }}
          PUBLIC_RELEASE_REPO: ${{ env.PUBLIC_RELEASE_REPO }}
