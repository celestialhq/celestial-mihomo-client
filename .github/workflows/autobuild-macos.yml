name: AutoBuild macOS

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or commit to build
        required: false
        default: dev
        type: string

permissions:
  contents: write
  actions: read

env:
  TAG_NAME: autobuild
  TAG_CHANNEL: AutoBuild
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0
  RUST_TOOLCHAIN: '1.91.0'
  NODE_VERSION: '24.15.0'
  PUBLIC_RELEASE_REPO: pius-pp/celestial-mihomo-client-public
  BUILD_REF: ${{ inputs.ref || 'dev' }}

concurrency:
  group: '${{ github.workflow }}-${{ inputs.ref || github.ref }}'
  cancel-in-progress: false

jobs:
  check_commit:
    name: Check Commit Needs Build
    uses: ./.github/workflows/check-commit-needs-build.yml
    with:
      tag_name: autobuild
      force_build: true
      ref: ${{ inputs.ref || 'dev' }}
    secrets: inherit

  prepare:
    name: Prepare AutoBuild metadata
    runs-on: ubuntu-latest
    needs: [check_commit]
    outputs:
      should_run: ${{ steps.meta.outputs.should_run }}
      build_ref: ${{ steps.meta.outputs.build_ref }}
      version: ${{ steps.meta.outputs.version }}
      release_name: ${{ steps.meta.outputs.release_name }}
      public_download_url: ${{ steps.meta.outputs.public_download_url }}
    steps:
      - name: Resolve metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "build_ref=${BUILD_REF}" >> "$GITHUB_OUTPUT"
          echo "version=${{ needs.check_commit.outputs.autobuild_version }}" >> "$GITHUB_OUTPUT"
          echo "release_name=Celestial AutoBuild" >> "$GITHUB_OUTPUT"
          echo "public_download_url=https://github.com/${PUBLIC_RELEASE_REPO}/releases/download/${TAG_NAME}" >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS Intel x64
    runs-on: macos-latest
    needs: [prepare]
    if: ${{ needs.prepare.outputs.should_run == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.build_ref }}
          fetch-depth: 50

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-apple-darwin

      - name: Add Rust target
        shell: bash
        run: |
          rustup target add x86_64-apple-darwin --toolchain ${{ env.RUST_TOOLCHAIN }} || rustup target add x86_64-apple-darwin
          rustup target list --installed

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          save-if: false
          prefix-key: v1-rust
          key: rust-shared-stable-macos-latest-x86_64-apple-darwin
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install x86 OpenSSL
        shell: bash
        run: |
          arch -x86_64 brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl@3)/include" >> "$GITHUB_ENV"
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl@3)/lib" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$(brew --prefix openssl@3)/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies and prebuild
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run prebuild x86_64-apple-darwin

      - name: Bump version to autobuild format
        run: pnpm release-version ${{ needs.prepare.outputs.version }}

      - name: Tauri build
        shell: bash
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build --target x86_64-apple-darwin

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./release-assets
          find target/x86_64-apple-darwin/release/bundle -type f \( \
            -name '*.dmg' -o \
            -name '*.app.tar.gz' -o \
            -name '*.sig' \
          \) -exec cp {} ./release-assets/ \;
          ls -lah ./release-assets

      - name: Fetch update logs
        shell: bash
        run: bash ./scripts/extract_update_logs.sh || true

      - name: Generate release body
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          DOWNLOAD_URL: ${{ needs.prepare.outputs.public_download_url }}
        run: |
          set -euo pipefail
          BUILDTIME="$(date -u '+%Y-%m-%d %H:%M UTC')"

          if [ -z "${UPDATE_LOGS:-}" ]; then
            UPDATE_LOGS="No changelog entry found for this build."
          fi

          cat > release.txt << EOF
          > This is an automated development build from the dev branch. It may be unstable. For stable builds, use the regular releases.

          ${UPDATE_LOGS}

          ## Downloads

          ### Windows
          #### Standard installer
          - [x64](${DOWNLOAD_URL}/Celestial_${VERSION}_x64-setup.exe)

          #### Bundled WebView2
          - [x64 setup](${DOWNLOAD_URL}/Celestial_${VERSION}_x64_fixed_webview2-setup.exe)
          - [x64 portable](${DOWNLOAD_URL}/Celestial_${VERSION}_x64_fixed_webview2_portable.zip)

          ### macOS
          - [Intel x64 DMG](${DOWNLOAD_URL}/Celestial_${VERSION}_x64.dmg)

          ### Linux
          #### DEB package
          - [x64](${DOWNLOAD_URL}/Celestial_${VERSION}_amd64.deb)

          #### RPM package
          - [x64](${DOWNLOAD_URL}/Celestial-${VERSION}-1.x86_64.rpm)

          ---

          Built at ${BUILDTIME}.
          EOF

      - name: Publish assets
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          DOWNLOAD_URL: ${{ needs.prepare.outputs.public_download_url }}
          PRIVATE_REPO: ${{ github.repository }}
          PUBLIC_REPO: ${{ env.PUBLIC_RELEASE_REPO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_RELEASE_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
        run: bash ./scripts-workflow/publish-autobuild-release.bash
