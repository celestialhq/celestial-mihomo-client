name: Check Commit Needs Build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to check against'
        required: false
        default: 'autobuild'
        type: string
      force_build:
        description: 'Force build regardless of checks'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag to check against'
        required: false
        default: 'autobuild'
        type: string
      force_build:
        description: 'Force build regardless of checks'
        required: false
        default: false
        type: boolean
    outputs:
      should_run:
        description: 'Whether the build should run'
        value: ${{ jobs.check_commit.outputs.should_run }}
      last_tauri_commit:
        description: 'Last commit hash with Tauri-related changes'
        value: ${{ jobs.check_commit.outputs.last_tauri_commit }}
      autobuild_version:
        description: 'Generated autobuild version string'
        value: ${{ jobs.check_commit.outputs.autobuild_version }}

permissions:
  contents: read
  actions: read

env:
  TAG_NAME: ${{ inputs.tag_name || 'autobuild' }}

jobs:
  check_commit:
    name: Check Commit Needs Build
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      last_tauri_commit: ${{ steps.check.outputs.last_tauri_commit }}
      autobuild_version: ${{ steps.check.outputs.autobuild_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Check whether a build is needed
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Force build if explicitly requested
          if [ "${{ inputs.force_build }}" == "true" ]; then
            echo "Force build requested."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "Current version: $CURRENT_VERSION"

          git checkout HEAD~1 package.json
          PREVIOUS_VERSION=$(jq -r '.version' package.json)
          echo "Previous version: $PREVIOUS_VERSION"
          git checkout HEAD package.json

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version bumped from $PREVIOUS_VERSION → $CURRENT_VERSION — build needed."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find the last commit that touched Tauri-related source files
          echo "Scanning recent commits for Tauri-related changes..."

          chmod +x scripts-workflow/get_latest_tauri_commit.bash
          LAST_TAURI_COMMIT_FULL=$(./scripts-workflow/get_latest_tauri_commit.bash)

          if [[ $? -ne 0 ]] || [[ -z "$LAST_TAURI_COMMIT_FULL" ]]; then
            echo "Could not determine last Tauri commit — falling back to HEAD."
            LAST_TAURI_COMMIT_FULL=$(git rev-parse HEAD)
          fi

          LAST_TAURI_COMMIT=$(git rev-parse --short "$LAST_TAURI_COMMIT_FULL")
          echo "Last Tauri-related commit: $LAST_TAURI_COMMIT"

          # Build the autobuild version string: X.Y.Z+autobuild.MMDD.commithash
          CURRENT_BASE_VERSION=$(echo "$CURRENT_VERSION" \
            | sed -E 's/-(alpha|beta|rc)(\.[0-9]+)?//g' \
            | sed -E 's/\+[a-zA-Z0-9.-]+//g')
          MONTH=$(date -u +%m)
          DAY=$(date -u +%d)
          AUTOBUILD_VERSION="${CURRENT_BASE_VERSION}+autobuild.${MONTH}${DAY}.${LAST_TAURI_COMMIT}"

          echo "Autobuild version: $AUTOBUILD_VERSION"
          echo "last_tauri_commit=$LAST_TAURI_COMMIT" >> $GITHUB_OUTPUT
          echo "autobuild_version=$AUTOBUILD_VERSION" >> $GITHUB_OUTPUT

          # Check the existing autobuild release
          echo "Checking existing release '${{ env.TAG_NAME }}'..."
          AUTOBUILD_RELEASE_EXISTS=$(gh release view "${{ env.TAG_NAME }}" --json id -q '.id' 2>/dev/null || echo "")

          if [ -z "$AUTOBUILD_RELEASE_EXISTS" ]; then
            echo "No existing autobuild release — build needed."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          LATEST_JSON_EXISTS=$(gh release view "${{ env.TAG_NAME }}" --json assets \
            -q '.assets[] | select(.name == "latest.json") | .name' 2>/dev/null || echo "")

          if [ -z "$LATEST_JSON_EXISTS" ]; then
            echo "No latest.json in existing release — build needed."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Downloading latest.json to compare commit hashes..."
          LATEST_JSON_URL="https://github.com/pius-pp/celestial-mihomo-client/releases/download/autobuild/latest.json"
          LATEST_JSON_CONTENT=$(curl -sL "$LATEST_JSON_URL" 2>/dev/null || echo "")

          if [ -z "$LATEST_JSON_CONTENT" ]; then
            echo "Could not download latest.json — build needed."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          LATEST_VERSION=$(echo "$LATEST_JSON_CONTENT" | jq -r '.version' 2>/dev/null || echo "")
          echo "Published autobuild version: $LATEST_VERSION"

          # Extract commit hash from version string (format: X.Y.Z+autobuild.MMDD.commithash)
          LATEST_COMMIT=$(echo "$LATEST_VERSION" \
            | sed -n 's/.*+autobuild\.[0-9]\{4\}\.\([a-f0-9]*\)$/\1/p' || echo "")
          echo "Published commit hash: $LATEST_COMMIT"

          if [ "$LAST_TAURI_COMMIT" != "$LATEST_COMMIT" ]; then
            echo "Commit hash changed ($LATEST_COMMIT → $LAST_TAURI_COMMIT) — build needed."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Same Tauri commit ($LAST_TAURI_COMMIT) already built — skipping."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi
          