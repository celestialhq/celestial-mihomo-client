name: Release Linux (private -> public)

on:
  push:
    tags:
      - 'v*.*.*'
      - 'testv*.*.*'

permissions:
  contents: read
  actions: read
  id-token: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  HUSKY: 0
  RUST_TOOLCHAIN: '1.91.0'
  NODE_VERSION: '24.15.0'
  RELEASE_SOURCE_BRANCH: dev
  PUBLIC_RELEASE_REPO: pius-pp/celestial-mihomo-client-public

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: false

jobs:
  prepare:
    name: Validate tag and prepare metadata
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      pkg_version: ${{ steps.meta.outputs.pkg_version }}
      version: ${{ steps.meta.outputs.version }}
      release_name: ${{ steps.meta.outputs.release_name }}
      is_test: ${{ steps.meta.outputs.is_test }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      public_download_url: ${{ steps.meta.outputs.public_download_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is from release branch
        shell: bash
        run: |
          set -euo pipefail
          TAG_COMMIT="$(git rev-list -n 1 "$GITHUB_REF_NAME")"
          git fetch origin "$RELEASE_SOURCE_BRANCH" --depth=1
          if git merge-base --is-ancestor "$TAG_COMMIT" "origin/$RELEASE_SOURCE_BRANCH"; then
            echo "Tag $GITHUB_REF_NAME is reachable from $RELEASE_SOURCE_BRANCH"
          else
            echo "Tag $GITHUB_REF_NAME is not on $RELEASE_SOURCE_BRANCH"
            exit 1
          fi

      - name: Validate tag format against package.json
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG_REF="${GITHUB_REF_NAME}"
          PKG_VERSION="$(jq -r .version package.json)"

          if [[ "$TAG_REF" =~ ^testv[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_TEST=true
            EXPECTED_TAG="testv${PKG_VERSION}"
            RELEASE_NAME="Celestial TEST ${TAG_REF}"
            IS_PRERELEASE=true
          elif [[ "$TAG_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_TEST=false
            EXPECTED_TAG="v${PKG_VERSION}"
            RELEASE_NAME="Celestial ${TAG_REF}"
            IS_PRERELEASE=false
          else
            echo "Unsupported tag format: $TAG_REF"
            exit 1
          fi

          if [[ "$TAG_REF" != "$EXPECTED_TAG" ]]; then
            echo "Version mismatch: git tag ($TAG_REF) does not match package.json ($EXPECTED_TAG)"
            exit 1
          fi

          echo "tag_name=$TAG_REF" >> "$GITHUB_OUTPUT"
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "is_test=$IS_TEST" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "public_download_url=https://github.com/${PUBLIC_RELEASE_REPO}/releases/download/${TAG_REF}" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build Linux x64
    needs: [prepare]
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: x86_64-unknown-linux-gnu

      - name: Add Rust target
        shell: bash
        run: |
          rustup target add x86_64-unknown-linux-gnu --toolchain ${{ env.RUST_TOOLCHAIN }} || rustup target add x86_64-unknown-linux-gnu
          rustup target list --installed

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          key: rust-shared-stable-ubuntu-22.04-x86_64-unknown-linux-gnu
          workspaces: |
            . -> target
          cache-all-crates: true
          cache-workspace-crates: true

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxslt1.1 libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies and prebuild
        shell: bash
        run: |
          pnpm install --frozen-lockfile
          pnpm run prebuild x86_64-unknown-linux-gnu

      - name: Tauri build
        shell: bash
        env:
          NODE_OPTIONS: --max_old_space_size=4096
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: pnpm tauri build --target x86_64-unknown-linux-gnu

      # Attestations are not available for user-owned private repositories.
      # - name: Attest build provenance
      #   uses: actions/attest-build-provenance@v4
      #   with:
      #     subject-path: |
      #       target/x86_64-unknown-linux-gnu/release/bundle/deb/*.deb
      #       target/x86_64-unknown-linux-gnu/release/bundle/rpm/*.rpm

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-x86_64-unknown-linux-gnu
          if-no-files-found: error
          path: |
            target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage
            target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
            target/x86_64-unknown-linux-gnu/release/bundle/**/*.rpm
            target/x86_64-unknown-linux-gnu/release/bundle/**/*.sig

  publish-public-release:
    name: Publish Linux assets to public repository
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-linux
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Flatten artifact tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ./release-assets
          find ./dist -type f -exec cp {} ./release-assets/ \;
          echo "Collected files:"
          ls -lah ./release-assets

      - name: Fetch update logs
        shell: bash
        run: bash ./scripts/extract_update_logs.sh || true

      - name: Generate release body
        shell: bash
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          DOWNLOAD_URL: ${{ needs.prepare.outputs.public_download_url }}
          IS_TEST: ${{ needs.prepare.outputs.is_test }}
        run: |
          set -euo pipefail
          BUILDTIME="$(date -u '+%Y-%m-%d %H:%M UTC')"

          if [ -z "${UPDATE_LOGS:-}" ]; then
            UPDATE_LOGS="No changelog entry found for this release."
          fi

          TEST_NOTE=""
          if [ "$IS_TEST" = "true" ]; then
            TEST_NOTE=$'\n> This is a TEST release published from the private repository pipeline.\n'
          fi

          cat > release.txt << EOF
          ${TEST_NOTE}
          ${UPDATE_LOGS}

          ## Downloads

          ### Windows
          #### Standard installer (recommended)
          - [x64 (most common)](${DOWNLOAD_URL}/Celestial_${VERSION}_x64-setup.exe)

          ### Linux
          #### DEB package (Debian / Ubuntu)
          - [x64](${DOWNLOAD_URL}/Celestial_${VERSION}_amd64.deb)

          #### RPM package (Fedora / RHEL)
          - [x64](${DOWNLOAD_URL}/Celestial-${VERSION}-1.x86_64.rpm)

          ---

          Built at ${BUILDTIME}.
          EOF

      - name: Create or update release in public repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          PUBLIC_REPO: ${{ env.PUBLIC_RELEASE_REPO }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          RELEASE_NAME: ${{ needs.prepare.outputs.release_name }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          PRERELEASE_FLAG=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$TAG_NAME" --repo "$PUBLIC_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" \
              --repo "$PUBLIC_REPO" \
              --title "$RELEASE_NAME" \
              --notes-file release.txt
          else
            gh release create "$TAG_NAME" \
              --repo "$PUBLIC_REPO" \
              --title "$RELEASE_NAME" \
              --notes-file release.txt \
              $PRERELEASE_FLAG || gh release edit "$TAG_NAME" \
                --repo "$PUBLIC_REPO" \
                --title "$RELEASE_NAME" \
                --notes-file release.txt
          fi

      - name: Upload assets to public release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_RELEASE_TOKEN }}
          PUBLIC_REPO: ${{ env.PUBLIC_RELEASE_REPO }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(./release-assets/*)

          if [ ${#files[@]} -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi

          gh release upload "$TAG_NAME" "${files[@]}" \
            --repo "$PUBLIC_REPO" \
            --clobber
