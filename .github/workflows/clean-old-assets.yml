name: Clean Old Release Assets

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to clean'
        required: false
        default: 'autobuild'
        type: string
      dry_run:
        description: 'Dry run — only show what would be deleted, do not delete'
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      tag_name:
        description: 'Release tag to clean'
        required: false
        default: 'autobuild'
        type: string
      dry_run:
        description: 'Dry run — only show what would be deleted, do not delete'
        required: false
        default: false
        type: boolean

permissions: write-all

env:
  TAG_NAME: ${{ inputs.tag_name || 'autobuild' }}

jobs:
  check_current_version:
    name: Resolve current version and commit
    runs-on: ubuntu-latest
    outputs:
      current_version: ${{ steps.check.outputs.current_version }}
      last_tauri_commit: ${{ steps.check.outputs.last_tauri_commit }}
      autobuild_version: ${{ steps.check.outputs.autobuild_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 50

      - name: Resolve version and last Tauri commit
        id: check
        run: |
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "Current version: $CURRENT_VERSION"

          echo "Scanning recent commits for Tauri-related changes..."
          LAST_TAURI_COMMIT=""
          for commit in $(git rev-list HEAD --max-count=50); do
            CHANGED_FILES=$(git show --name-only --pretty=format: "$commit" | tr '\n' ' ')

            HAS_TAURI_CHANGES=false
            if echo "$CHANGED_FILES" | grep -q "src/" && \
               echo "$CHANGED_FILES" | grep -qvE "src/(dist|build|node_modules|\.next|\.cache)"; then
              HAS_TAURI_CHANGES=true
            elif echo "$CHANGED_FILES" | grep -qE \
               "src-tauri/(src|Cargo\.(toml|lock)|tauri\..*\.conf\.json|build\.rs|capabilities)"; then
              HAS_TAURI_CHANGES=true
            fi

            if [ "$HAS_TAURI_CHANGES" = true ]; then
              LAST_TAURI_COMMIT=$(git rev-parse --short "$commit")
              break
            fi
          done

          if [ -z "$LAST_TAURI_COMMIT" ]; then
            echo "No Tauri-related changes found in recent commits — using HEAD."
            LAST_TAURI_COMMIT=$(git rev-parse --short HEAD)
          fi

          echo "Last Tauri commit: $LAST_TAURI_COMMIT"

          CURRENT_BASE_VERSION=$(echo "$CURRENT_VERSION" \
            | sed -E 's/-(alpha|beta|rc)(\.[0-9]+)?//g' \
            | sed -E 's/\+[a-zA-Z0-9.-]+//g')
          MONTH=$(date -u +%m)
          DAY=$(date -u +%d)
          AUTOBUILD_VERSION="${CURRENT_BASE_VERSION}+autobuild.${MONTH}${DAY}.${LAST_TAURI_COMMIT}"
          echo "Current autobuild version: $AUTOBUILD_VERSION"

          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "last_tauri_commit=$LAST_TAURI_COMMIT" >> $GITHUB_OUTPUT
          echo "autobuild_version=$AUTOBUILD_VERSION" >> $GITHUB_OUTPUT

  clean_old_assets:
    name: Delete stale assets from release
    runs-on: ubuntu-latest
    needs: check_current_version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Clean stale assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ env.TAG_NAME }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          CURRENT_AUTOBUILD_VERSION="${{ needs.check_current_version.outputs.autobuild_version }}"
          LAST_TAURI_COMMIT="${{ needs.check_current_version.outputs.last_tauri_commit }}"
          CURRENT_VERSION="${{ needs.check_current_version.outputs.current_version }}"

          echo "Version      : $CURRENT_VERSION"
          echo "AB version   : $CURRENT_AUTOBUILD_VERSION"
          echo "Tauri commit : $LAST_TAURI_COMMIT"
          echo "Tag          : $TAG_NAME"
          echo "Dry run      : $DRY_RUN"

          RELEASE_EXISTS=$(gh release view "$TAG_NAME" --json id -q '.id' 2>/dev/null || echo "")
          if [ -z "$RELEASE_EXISTS" ]; then
            echo "Release '$TAG_NAME' not found — nothing to clean."
            exit 1
          fi

          echo "Listing assets in '$TAG_NAME'..."
          assets=$(gh release view "$TAG_NAME" --json assets -q '.assets[].name' || true)

          if [ -z "$assets" ]; then
            echo "No assets found in release '$TAG_NAME'."
            exit 0
          fi

          echo "Assets found:"
          echo "$assets" | sed 's/^/  - /'

          ASSETS_TO_KEEP=""
          ASSETS_TO_DELETE=""

          for asset in $assets; do
            if [[ "$asset" == *"$CURRENT_AUTOBUILD_VERSION"* ]] || [[ "$asset" == "latest.json" ]]; then
              ASSETS_TO_KEEP="$ASSETS_TO_KEEP$asset\n"
            else
              ASSETS_TO_DELETE="$ASSETS_TO_DELETE$asset\n"
            fi
          done

          echo ""
          echo "Assets to keep (version: $CURRENT_AUTOBUILD_VERSION):"
          if [ -n "$ASSETS_TO_KEEP" ]; then
            echo -e "$ASSETS_TO_KEEP" | grep -v '^$' | sed 's/^/  ✅ /'
          else
            echo "  (none)"
          fi

          echo ""
          echo "Assets to delete:"
          if [ -n "$ASSETS_TO_DELETE" ]; then
            echo -e "$ASSETS_TO_DELETE" | grep -v '^$' | sed 's/^/  🗑️  /'
          else
            echo "  (none — nothing to clean)"
            exit 0
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo ""
            echo "Dry run mode — no assets were deleted."
            echo "Re-run with dry_run=false to apply."
            exit 0
          fi

          echo ""
          echo "Deleting stale assets..."
          DELETED_COUNT=0
          FAILED_COUNT=0

          for asset in $assets; do
            if [[ "$asset" == *"$CURRENT_AUTOBUILD_VERSION"* ]] || [[ "$asset" == "latest.json" ]]; then
              continue
            fi
            echo "  Deleting: $asset"
            if gh release delete-asset "$TAG_NAME" "$asset" -y 2>/dev/null; then
              DELETED_COUNT=$((DELETED_COUNT + 1))
            else
              echo "  Warning: failed to delete $asset"
              FAILED_COUNT=$((FAILED_COUNT + 1))
            fi
          done

          echo ""
          echo "Summary:"
          echo "  Deleted : $DELETED_COUNT"
          echo "  Failed  : $FAILED_COUNT"
          echo "  Kept    : $(echo -e "$ASSETS_TO_KEEP" | grep -v '^$' | wc -l)"

          if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "Some assets could not be deleted — check the log above."
            exit 1
          fi
          echo "Cleanup complete."
          