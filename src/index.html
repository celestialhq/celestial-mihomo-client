<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="shortcut icon"
      href="./assets/image/logo.ico"
      type="image/x-icon"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Celestial</title>
    <style>
      :root {
        --bg-color: #070b12;
        --text-color: #eef7ff;
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        color: var(--text-color);
      }

      #root {
        width: 100%;
        height: 100%;
      }

      #initial-loading-overlay {
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 72% 12%, rgba(185, 167, 255, 0.18), transparent 28%),
          linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px),
          var(--bg-color);
        background-size: auto, 34px 34px, 34px 34px, auto;
        z-index: 9999;
        transition: opacity 0.2s ease-out;
      }

      #initial-loading-overlay[data-hidden='true'] {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="initial-loading-overlay"></div>
    <script>
      if (window.__TAURI_INTERNALS__) {
        window.__TAURI_INTERNALS__
          .invoke('plugin:window|show', { label: 'main' })
          .catch(function () {});
        window.__TAURI_INTERNALS__
          .invoke('plugin:window|set_focus', { label: 'main' })
          .catch(function () {});
      }
    </script>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
